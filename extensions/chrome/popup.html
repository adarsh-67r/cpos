<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="popup.css" />
<link rel="stylesheet" href="contests.css" />
<link rel="stylesheet" href="practice.css" />
</head>
<body data-theme="light">
  <header class="hdr">
    <div class="brand">
      <svg class="logo" viewBox="0 0 128 128" aria-hidden="true">
        <rect class="tile" width="128" height="128" rx="28"/>
        <g class="pix">
          <rect x="34" y="22" width="11" height="11" rx="1.5"/><rect x="46" y="22" width="11" height="11" rx="1.5"/><rect x="58" y="22" width="11" height="11" rx="1.5"/><rect x="70" y="22" width="11" height="11" rx="1.5"/><rect x="82" y="22" width="11" height="11" rx="1.5"/>
          <rect x="22" y="34" width="11" height="11" rx="1.5"/><rect x="34" y="34" width="11" height="11" rx="1.5"/><rect x="46" y="34" width="11" height="11" rx="1.5"/><rect x="58" y="34" width="11" height="11" rx="1.5"/><rect x="70" y="34" width="11" height="11" rx="1.5"/><rect x="82" y="34" width="11" height="11" rx="1.5"/><rect x="94" y="34" width="11" height="11" rx="1.5"/>
          <rect x="22" y="46" width="11" height="11" rx="1.5"/><rect x="34" y="46" width="11" height="11" rx="1.5"/>
          <rect x="22" y="58" width="11" height="11" rx="1.5"/><rect x="34" y="58" width="11" height="11" rx="1.5"/>
          <rect x="22" y="70" width="11" height="11" rx="1.5"/><rect x="34" y="70" width="11" height="11" rx="1.5"/>
          <rect x="22" y="82" width="11" height="11" rx="1.5"/><rect x="34" y="82" width="11" height="11" rx="1.5"/><rect x="46" y="82" width="11" height="11" rx="1.5"/><rect x="58" y="82" width="11" height="11" rx="1.5"/><rect x="70" y="82" width="11" height="11" rx="1.5"/><rect x="82" y="82" width="11" height="11" rx="1.5"/><rect x="94" y="82" width="11" height="11" rx="1.5"/>
          <rect x="34" y="94" width="11" height="11" rx="1.5"/><rect x="46" y="94" width="11" height="11" rx="1.5"/><rect x="58" y="94" width="11" height="11" rx="1.5"/><rect x="70" y="94" width="11" height="11" rx="1.5"/><rect x="82" y="94" width="11" height="11" rx="1.5"/>
        </g>
      </svg>
      <div class="brand-txt">
        <div class="title">CPOS</div>
        <div class="sub">Competitive Programming OS</div>
      </div>
    </div>
    <div class="conn" id="conn" title="Local CPOS app (VS Code / terminal) connection">
      <span class="dot" id="connDot"></span><span id="connText">checking…</span>
    </div>
  </header>

  <section class="card">
    <div class="card-h">Core</div>
    <div class="rows">
      <label class="row" data-feature="profile">
        <span class="ic" data-icon="profile"></span>
        <span class="rtxt"><b>Profile analytics</b><small>extra charts on Codeforces profiles</small></span>
        <span class="sw"><input type="checkbox" data-feature-input="profile" /><span></span></span>
      </label>
      <label class="row" data-feature="ide">
        <span class="ic" data-icon="ide"></span>
        <span class="rtxt"><b>In-browser editor</b><small>code & submit on the problem page</small></span>
        <span class="sw"><input type="checkbox" data-feature-input="ide" /><span></span></span>
      </label>
      <label class="row" data-feature="highlight">
        <span class="ic" data-icon="highlight"></span>
        <span class="rtxt"><b>Code & LaTeX styling</b><small>highlight statements & editorials</small></span>
        <span class="sw"><input type="checkbox" data-feature-input="highlight" /><span></span></span>
      </label>
      <label class="row" data-feature="problemTools">
        <span class="ic" data-icon="problemTools"></span>
        <span class="rtxt"><b>Problem tools</b><small>rating badge, tag hider & sample copy</small></span>
        <span class="sw"><input type="checkbox" data-feature-input="problemTools" /><span></span></span>
      </label>
      <label class="row" data-feature="problemsetTools">
        <span class="ic" data-icon="problemsetTools"></span>
        <span class="rtxt"><b>Problemset solve-status</b><small>color rows by solved / attempted</small></span>
        <span class="sw"><input type="checkbox" data-feature-input="problemsetTools" /><span></span></span>
      </label>
      <label class="row" data-feature="dailyProblem">
        <span class="ic" data-icon="dailyProblem"></span>
        <span class="rtxt"><b>Daily problem & streak</b><small>a problem of the day for your rating</small></span>
        <span class="sw"><input type="checkbox" data-feature-input="dailyProblem" /><span></span></span>
      </label>
      <label class="row" data-feature="favorites">
        <span class="ic" data-icon="favorites"></span>
        <span class="rtxt"><b>Favorites</b><small>bookmark problems with a star</small></span>
        <span class="sw"><input type="checkbox" data-feature-input="favorites" /><span></span></span>
      </label>
      <label class="row" data-feature="contestReminders">
        <span class="ic" data-icon="contestReminders"></span>
        <span class="rtxt"><b>Contest reminders</b><small>notify before upcoming CF contests</small></span>
        <span class="sw"><input type="checkbox" data-feature-input="contestReminders" /><span></span></span>
      </label>
    </div>
  </section>

  <details class="card adv">
    <summary><span class="card-h">Advanced</span><small>power-user tools</small></summary>
    <div class="rows">
      <label class="row" data-feature="carrot">
        <span class="ic" data-icon="carrot"></span>
        <span class="rtxt"><b>Rating predictions</b><small>predicted deltas on standings</small></span>
        <span class="sw"><input type="checkbox" data-feature-input="carrot" /><span></span></span>
      </label>
      <label class="row" data-feature="profileCompare">
        <span class="ic" data-icon="profileCompare"></span>
        <span class="rtxt"><b>Profile compare (VS)</b><small>side-by-side stats & rating overlay</small></span>
        <span class="sw"><input type="checkbox" data-feature-input="profileCompare" /><span></span></span>
      </label>
      <label class="row" data-feature="standingsTools">
        <span class="ic" data-icon="standingsTools"></span>
        <span class="rtxt"><b>Standings tools</b><small>color rows by language; friends-only filter</small></span>
        <span class="sw"><input type="checkbox" data-feature-input="standingsTools" /><span></span></span>
      </label>
      <label class="row" data-feature="problemTimer">
        <span class="ic" data-icon="problemTimer"></span>
        <span class="rtxt"><b>Problem timer</b><small>per-problem stopwatch that auto-resumes</small></span>
        <span class="sw"><input type="checkbox" data-feature-input="problemTimer" /><span></span></span>
      </label>
      <label class="row" data-feature="annotate">
        <span class="ic" data-icon="annotate"></span>
        <span class="rtxt"><b>Marker & notes</b><small>highlight & annotate statement text</small></span>
        <span class="sw"><input type="checkbox" data-feature-input="annotate" /><span></span></span>
      </label>
    </div>
  </details>

  <section class="card">
    <div class="card-h">Contests</div>
    <div id="cpos-contests-section"></div>
  </section>

  <section class="card">
    <div class="card-h">Practice</div>
    <div id="cpos-practice-section"></div>
  </section>

  <details class="card adv" id="templateCard">
    <summary><span class="card-h">Templates</span><small id="templateSync">local</small></summary>
    <div class="template-config">
      <label class="template-label" for="templateLang">Template language</label>
      <select id="templateLang"></select>
      <label class="template-label" for="templateText">Starter template</label>
      <textarea id="templateText" spellcheck="false" placeholder="Paste your template here…"></textarea>
      <input id="templateFile" type="file" hidden />
      <div class="template-actions">
        <button id="templateUpload" type="button">Upload file</button>
        <button id="templateReset" type="button">Reset</button>
        <button id="templateSave" class="primary" type="button">Save &amp; sync</button>
      </div>
    </div>
  </details>

  <section class="card">
    <div class="card-h">Appearance <small id="siteHint"></small></div>
    <div class="theme-field">
      <div class="theme-lbl"><b>Theme</b><small>one palette — popup, site &amp; all CPOS tools</small></div>
      <div class="swatches" id="themeSwatches"></div>
      <label class="custom-pick" id="customPick" title="Pick your own accent colour">
        <span class="custom-chip"><input type="color" id="customColor" value="#b794ff" /></span>
        <span class="custom-txt">Custom colour</span>
      </label>
    </div>
    <div class="rows">
      <label class="row" data-feature="modernize">
        <span class="ic" data-icon="modernize"></span>
        <span class="rtxt"><b>Modernize</b><small>sleek font, spacing & cards for CF / CSES</small></span>
        <span class="sw"><input type="checkbox" data-feature-input="modernize" /><span></span></span>
      </label>
    </div>
  </section>

  <footer class="ftr">
    <a href="https://github.com/Soham109/cpos" target="_blank" rel="noopener">GitHub</a>
    <span class="ver" id="ver"></span>
  </footer>

  <script src="themes.js"></script>
  <script src="cpos-config.js"></script>
  <script src="popup.js"></script>
  <script src="contests-ui.js"></script>
  <script src="practice-ui.js"></script>
</body>
</html>
