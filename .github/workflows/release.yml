name: Release TUI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            os: macos-14
            target: aarch64-apple-darwin
            archive: cpos-aarch64-apple-darwin.tar.gz
          - label: macOS Intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            archive: cpos-x86_64-apple-darwin.tar.gz
          - label: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: cpos-x86_64-unknown-linux-gnu.tar.gz
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: cpos-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/cpos" dist/cpos
          chmod +x dist/cpos
          tar -C dist -czf "${{ matrix.archive }}" cpos

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/cpos.exe" "dist/cpos.exe"
          Compress-Archive -Path "dist/cpos.exe" -DestinationPath "${{ matrix.archive }}" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: [build, package-manifests]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  package-manifests:
    name: Generate package-manager files
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate Homebrew and Scoop manifests
        run: |
          python3 tools/write_package_manifests.py \
            --version "${GITHUB_REF_NAME}" \
            --assets release-assets \
            --out package-files

      - uses: actions/upload-artifact@v4
        with:
          name: package-manifests
          path: |
            package-files/Formula/cpos.rb
            package-files/bucket/cpos.json
            package-files/SHA256SUMS
          if-no-files-found: error

  update-package-files:
    name: Update tap and bucket files
    needs: package-manifests
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          name: package-manifests
          path: package-files

      - name: Commit generated package files
        run: |
          mkdir -p Formula bucket
          cp package-files/Formula/cpos.rb Formula/cpos.rb
          cp package-files/bucket/cpos.json bucket/cpos.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/cpos.rb bucket/cpos.json
          git commit -m "Update package manifests for ${GITHUB_REF_NAME}" || exit 0
          git push
